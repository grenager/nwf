# Supabase local/dev config for NewsWithFriends.
# Docs: https://supabase.com/docs/guides/cli/config
project_id = "newswithfriends"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
# Local dev values; production uses https://newswithfriends.org (set in the
# Supabase dashboard under Auth -> URL Configuration).
site_url = "http://localhost:3000"
additional_redirect_urls = [
    "http://localhost:3000",
    "http://localhost:3000/feed",
    "https://newswithfriends.org/feed",
    "https://www.newswithfriends.org/feed",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
# Magic-link / OTP sign-in (no passwords).
enable_confirmations = false
