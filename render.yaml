# Render blueprint: FastAPI API (web service).
# The web frontend deploys separately on Vercel; the database + auth on Supabase.
services:
  - type: web
    name: nwf-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerCommand: nwf-api
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_API_SECRET
        generateValue: true
      - key: API_PORT
        value: "8000"
      - key: LOG_JSON
        value: "true"
